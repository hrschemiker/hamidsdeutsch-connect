appId: com.hamidsdeutsch.connect
productName: HamidsDeutsch Connect
copyright: Copyright © 2026 HamidsDeutsch

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!release/**"
  - "!release-reports/**"
  - "!scripts/**"
  - "!resources/**"
  - "!**/*.map"
  - "!**/*.md"

extraResources:
  - from: resources/sing-box
    to: sing-box
    filter:
      - "**/*"
  - from: resources/python
    to: python
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "electron/cfray/**"
compression: maximum

publish:
  provider: github
  owner: hrschemiker
  repo: HamidsDeutsch-Connect
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  executableName: HamidsDeutsch Connect
  requestedExecutionLevel: asInvoker
  artifactName: HamidsDeutsch-Connect-Setup-${version}-x64.${ext}
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: HamidsDeutsch Connect
  uninstallDisplayName: HamidsDeutsch Connect
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  installerLanguages:
    - en_US
